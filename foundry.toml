# Foundry configuration for the LCP skill.
# The Pharos Skill Agent runs `forge test -vvv` against this file.
[profile.default]
src       = "src"
test      = "test"
out       = "out"
libs      = ["lib"]
solc      = "0.8.20"
optimizer = true
optimizer_runs = 200
fuzz      = { runs = 64 }

# Display verbosity
verbosity = 2
